openapi: 3.1.0
info:
  title: Chronicle API
  version: 0.1.0
  description: Current Chronicle API surface for the truthful MVP.
servers:
  - url: http://localhost:8080
paths:
  /api/v1/artifacts/upload:
    post:
      summary: Register an uploaded artifact
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "201":
          description: Artifact registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"
  /api/v1/artifacts:
    get:
      summary: List uploaded artifacts
      responses:
        "200":
          description: Artifact list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Artifact"
  /api/v1/artifacts/{id}:
    get:
      summary: Get an artifact
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"
  /api/v1/artifacts/{id}/ingest:
    post:
      summary: Run local extraction and chunking
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "202":
          description: Extraction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionResult"
  /api/v1/artifacts/{id}/chunks:
    get:
      summary: List chunks for an artifact
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Artifact chunks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArtifactChunk"
  /api/v1/memories:
    post:
      summary: Create a memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Memory"
      responses:
        "201":
          description: Memory created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
  /api/v1/memories/{id}/analyze:
    post:
      summary: Generate observations from a memory
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Observations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Observation"
  /api/v1/memories/{id}/questions:
    post:
      summary: Generate open questions from a memory
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "201":
          description: Open questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenQuestion"
  /api/v1/memories/{id}/hypotheses:
    post:
      summary: Generate hypotheses from a memory
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "201":
          description: Hypotheses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hypothesis"
  /api/v1/memories/{id}/chapter:
    post:
      summary: Generate a chapter draft from a memory
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "202":
          description: Chapter draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookDraft"
components:
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    Artifact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fileName:
          type: string
        contentType:
          type: string
        format:
          type: string
        status:
          type: string
        uploadedAt:
          type: string
          format: date-time
        ingestedAt:
          type: string
          format: date-time
          nullable: true
        chunkCount:
          type: integer
        memoryCount:
          type: integer
        observationCount:
          type: integer
        hypothesisCount:
          type: integer
    ArtifactChunk:
      type: object
      properties:
        id:
          type: string
          format: uuid
        artifactId:
          type: string
          format: uuid
        fileName:
          type: string
        pageNumber:
          type: integer
        chunkNumber:
          type: integer
        text:
          type: string
        provenance:
          type: array
          items:
            type: object
    ExtractionResult:
      type: object
      properties:
        artifactId:
          type: string
          format: uuid
        fileName:
          type: string
        extractedText:
          type: string
        chunks:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactChunk"
        memories:
          type: array
          items:
            $ref: "#/components/schemas/Memory"
        observations:
          type: array
          items:
            $ref: "#/components/schemas/Observation"
        hypotheses:
          type: array
          items:
            $ref: "#/components/schemas/Hypothesis"
    Memory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        title:
          type: string
        canonicalText:
          type: string
    Observation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        memoryId:
          type: string
          format: uuid
        text:
          type: string
        confidence:
          type: number
    OpenQuestion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        memoryId:
          type: string
          format: uuid
        questionText:
          type: string
    Hypothesis:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        text:
          type: string
        confidence:
          type: number
        provenance:
          type: string
    BookDraft:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        status:
          type: string
